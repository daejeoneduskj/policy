<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="대전교육 대전환 3대 약속 — 안전하고 행복한 학교, 현장 중심 교육행정 혁신, AI 시대 미래 교육">
  <title>3대 약속 | 준비된 교육감 성광진</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-hero { background:var(--navy); color:var(--white); padding:clamp(3.5rem,7vw,5.5rem) 0 clamp(3rem,6vw,4.5rem); position:relative; overflow:hidden; }
    .breadcrumb { font-size:.8125rem; color:rgba(255,255,255,.5); margin-bottom:1rem; display:flex; align-items:center; gap:.4rem; }
    .breadcrumb a { color:rgba(255,255,255,.6); }
    .promise-big { display:flex; flex-direction:column; gap:2.5rem; }
    .promise-big-card { display:grid; grid-template-columns:120px 1fr; gap:2.5rem; align-items:start; background:var(--white); border:2px solid var(--gray-200); border-radius:var(--radius-xl); padding:2.5rem; transition:all var(--transition); }
    .promise-big-card:hover { border-color:var(--navy); box-shadow:var(--shadow-md); }
    .promise-big-num { display:flex; align-items:center; justify-content:center; width:80px; height:80px; border-radius:50%; background:var(--navy); color:var(--white); font-family:var(--font-serif); font-size:2rem; font-weight:800; }
    .promise-big-icon { font-size:1.75rem; margin-top:.5rem; text-align:center; }
    .promise-big-title { font-family:var(--font-serif); font-size:1.5rem; font-weight:800; color:var(--navy); margin-bottom:1.25rem; line-height:1.3; }
    .promise-items-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .promise-item-card { background:var(--off-white); border-radius:var(--radius-md); padding:1.25rem; }
    .promise-item-title { font-weight:700; color:var(--navy); margin-bottom:.35rem; font-size:.9375rem; }
    .promise-item-desc { font-size:.875rem; color:var(--gray-600); line-height:1.6; }
    @media (max-width:768px) { .promise-big-card { grid-template-columns:1fr; } .promise-items-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<main id="main-content" class="page-offset">

  <section class="page-hero">
    <div class="container" style="position:relative;z-index:1">
      <nav class="breadcrumb" aria-label="경로">
        <a href="../index.html">홈</a> <span>›</span> <span aria-current="page">3대 약속</span>
      </nav>
      <span class="section-label light">대전교육 대전환 · 미래를 여는</span>
      <h1 class="section-title light">3대 약속</h1>
      <p class="section-subtitle light" style="margin-bottom:0;max-width:600px">폭력과 사고 없는 안심 학교, 기초학력 책임교육과 AI 기반 자기주도적 성장을 지원하겠습니다. 교사의 본업 집중과 교육노동자의 기본권을 보장하겠습니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="promise-big" id="promises-big" role="list"></div>
      <div style="margin-top:4rem;background:var(--off-white);border-radius:var(--radius-xl);padding:2.5rem;text-align:center">
        <span class="section-label">3대 약속의 구체적 실천</span>
        <h2 class="section-title" style="margin-bottom:.75rem">대전교육 9하기로<br>하나하나 실현하겠습니다</h2>
        <p style="font-size:1rem;color:var(--gray-600);margin-bottom:1.5rem">3대 약속은 9개 핵심 공약으로 구체화됩니다.</p>
        <a href="policies.html" class="btn btn-primary">대전교육 9하기 전체 보기 →</a>
      </div>
    </div>
  </section>
</main>
<div id="footer-placeholder"></div>

<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('promises-big').innerHTML = SKJ_DATA.promises3.map((p, i) => `
      <article class="promise-big-card fade-in fade-in-delay-${i+1}" role="listitem">
        <div style="text-align:center">
          <div class="promise-big-num">${p.num}</div>
          <div class="promise-big-icon" aria-hidden="true">${p.icon}</div>
        </div>
        <div>
          <h2 class="promise-big-title">${p.title}</h2>
          <div class="promise-items-grid">
            ${p.items.map(it => `
              <div class="promise-item-card">
                <div class="promise-item-title">${it.label}</div>
                <div class="promise-item-desc">${it.desc}</div>
              </div>`).join('')}
          </div>
        </div>
      </article>`).join('');
    initFadeIn();
  });
</script>
</body>
</html>
